project:
  title: "ALU básica de 4 bits"
  author: "Vanessa Rocha Perez"
  description: "Una ALU simple que realiza operaciones aritméticas y lógicas entre dos operandos de 4 bits."
  language: "Verilog"
  clock_hz: 1000000

  inputs:
    - ui_in[0]
    - ui_in[1]
    - ui_in[2]
    - ui_in[3]
    - ui_in[4]
    - ui_in[5]
    - ui_in[6]
    - ui_in[7]

  outputs:
    - uo_out[0]
    - uo_out[1]
    - uo_out[2]
    - uo_out[3]
    - uo_out[4]
    - uo_out[5]
    - uo_out[6]
    - uo_out[7]

  bidirectional:
    - uio_in[0]
    - uio_in[1]
    - uio_in[2]
    - uio_in[3]
    - uio_in[4]
    - uio_in[5]
    - uio_in[6]
    - uio_in[7]

  pins:
    ui_in[3:0]: "Operando A"
    ui_in[7:4]: "Operando B"
    uio_in[2:0]: "Selector de operación"
    uo_out[7:0]: "Resultado de la ALU"
